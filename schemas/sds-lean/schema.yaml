name: sds-lean
version: 1
description: SDS lean tier — small, low-risk changes. Requires proposal, tasks, and delta spec.
artifacts:
  - id: proposal
    generates: proposal.md
    description: Why this change exists and why it should happen now
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Sections:
      - **Why**: 1-2 sentences on the problem or opportunity. What problem does this solve? Why now?
      - **What Changes**: Bullet list of changes. Be specific about new capabilities, modifications, or removals.
        Mark breaking changes with **BREAKING**.
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`.
          Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing.
          Each needs a delta spec file. Check `openspec/specs/` for existing spec names.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      Does NOT contain requirements, architecture decisions, or implementation details.
      Keep it concise (1-2 pages). Focus on the "why" not the "how".
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Delta specifications for capabilities added or modified by this change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: `specs/<capability>/spec.md`
      - Modified capabilities: use existing spec folder name from `openspec/specs/<capability>/`

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - Every requirement MUST have at least one scenario

      Use XML tags for structured content (AI-native format):
      ```
      <requirement id="REQ-001">
      The system SHALL ...
      </requirement>
      ```

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior — include full updated content
      - **REMOVED Requirements**: Deprecated features — include Reason and Migration
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Ordered implementation checklist
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency

      Each task should be verifiable — you know when it's done.
      Reference specs for what needs to be built.
    requires:
      - specs

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
