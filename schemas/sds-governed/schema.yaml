name: sds-governed
version: 1
description: SDS governed tier — regulated, high-risk, or cross-cutting changes. Full governance artifact suite required. Validation failures are errors that block promotion.
artifacts:
  - id: proposal
    generates: proposal.md
    description: Why this change exists and why it should happen now
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.
      Does NOT contain requirements, architecture decisions, or implementation details.
    requires: []

  - id: brief
    generates: brief.md
    description: Stakeholder, problem, and environment context (Analyst role)
    template: brief.md
    instruction: |
      Create the brief. Include brownfield inventory for legacy system state.
      Does NOT contain requirements or acceptance criteria.
    requires:
      - proposal

  - id: brownfield-notes
    generates: brownfield-notes.md
    description: Discovery findings, dependency map, and unknown inventory
    template: brownfield-notes.md
    instruction: |
      Complete brownfield discovery. Dependency inventory must be complete or unknowns
      must be explicitly listed with owners and resolution plans.
      This artifact gates PRD authorship.
    requires:
      - brief

  - id: prd
    generates: prd.md
    description: Outcomes, requirements, and acceptance criteria (PM role)
    template: prd.md
    instruction: |
      Create the PRD. Every <requirement> must have at least one <scenario>.
      Implicit contracts from brownfield-notes.md must appear as constraints or NFRs.
      Use <requirement id="REQ-NNN"> XML tags.
      Does NOT contain architecture decisions.
    requires:
      - brownfield-notes

  - id: architecture
    generates: architecture.md
    description: System topology, interfaces, and tradeoffs (Architect role)
    template: architecture.md
    instruction: |
      Create the architecture document. Every <decision> must link to at least one <requirement>.
      Trust zones and control points must be explicit.
      Use <decision id="ADR-NNN"> XML tags.
    requires:
      - prd

  - id: design
    generates: design.md
    description: Technical decisions specific to this change
    template: design.md
    instruction: |
      Create the design document. Reference library patterns by ID.
      Address legacy constraints from brownfield-notes.md.
    requires:
      - architecture

  - id: capability
    generates: capability.yaml
    description: Typed capability definition with composability constraints and BAML binding
    template: capability.yaml
    instruction: |
      Author the capability.yaml for this change. Define:
      - inputs and outputs (typed)
      - preconditions
      - effects (reversible, external, idempotent, produces_evidence)
      - composability (compatible_with, conflicts_with, requires_before, requires_after)
      - guarantees (invariants that must hold after execution)
      - baml_binding (function name; set auto_generate: true to generate stub)
      - tags (domain tags)

      Reference primitive capabilities from library/capability/registry.yaml.
      Run /sds:compile-baml after authoring to generate BAML stubs.
    requires:
      - architecture

  - id: controls
    generates: controls.md
    description: Policy rules, risk boundaries, and escalation triggers (Governor role)
    template: controls.md
    instruction: |
      Create controls.md. Governor role — execute as a context-isolated review pass.

      Every <control> must specify:
      - enforcement_level: hard | soft | advisory
      - evidence_type: which form of evidence satisfies this control
      - evidence_produced_by: which capability or tool produces the evidence

      Use <control id="CTL-NNN"> XML tags.
      Does NOT contain validation procedures.
    requires:
      - capability

  - id: risk
    generates: risk.md
    description: Failure modes, misuse paths, and rollback assumptions (Governor role)
    template: risk.md
    instruction: |
      Create risk.md. Governor role — same context-isolated pass as controls.md.

      Use <risk id="RSK-NNN"> XML tags with:
      - severity: critical | high | medium | low
      - trigger: what causes this risk to materialize
      - mitigation: how it is prevented or contained
      - residual: what risk remains after mitigation

      At least one <risk> per external capability dependency.
    requires:
      - controls

  - id: capability-surface
    generates: capability_surface.md
    description: Derived safe action space — BUILD ARTIFACT, do not edit manually
    template: _build-artifact.md
    instruction: |
      capability_surface.md is a BUILD ARTIFACT generated by /sds:compute-surface.
      DO NOT author this file manually — run /sds:compute-surface instead.

      It reads capability.yaml, controls.md, risk.md, and library/capability/registry.yaml
      and computes the set of actions that are safely reachable given current constraints.

      This file MUST be regenerated after any modification to capability.yaml or controls.md.
    requires:
      - risk

  - id: validation
    generates: validation.md
    description: What must be verified before approval, merge, and release (Verifier role)
    template: validation.md
    instruction: |
      Create validation.md. Verifier role — execute as a context-isolated review pass.

      Organize as three executable checklists:
      - Pre-approval checks (required before governed-tier change is approved)
      - Pre-merge checks (required before branch is merged)
      - Pre-release checks (required before deployment to Lighthouse envelope)

      Each item must reference a control ID (CTL-NNN) and specify the required evidence form.
      Use <evidence id="EVD-NNN" control="CTL-NNN"> XML tags.
    requires:
      - capability-surface

  - id: specs
    generates: "specs/**/*.md"
    description: Delta specifications for capabilities added or modified
    template: spec.md
    instruction: |
      Create spec files. Use XML tags. Every <requirement> must have at least one <scenario>.
      Requirements must reflect prd.md. Scenarios must be executable.
    requires:
      - prd

  - id: traceability
    generates: traceability.md
    description: Artifact-to-artifact linkage map — BUILD ARTIFACT generated by /sds:traceability-check
    template: _build-artifact.md
    instruction: |
      traceability.md is a BUILD ARTIFACT generated by /sds:traceability-check.
      DO NOT author this file manually except within the traceability_overrides section.

      Run /sds:traceability-check to generate and validate:
      - Every <requirement> linked to at least one <scenario> or <evidence>
      - Every <control> linked to at least one <requirement> and one <evidence>
      - Every <decision> in architecture.md linked to at least one <requirement>

      Validation failures at governed tier are ERRORS that block promotion.
    requires:
      - validation
      - specs

  - id: simulation
    generates: simulation.md
    description: Pre-execution behavioral analysis — BUILD ARTIFACT generated by /sds:simulate-capability
    template: _build-artifact.md
    instruction: |
      simulation.md is a BUILD ARTIFACT generated by /sds:simulate-capability.
      DO NOT author this file manually.

      No governed-tier change is approved if simulation.md contains an open CRITICAL finding.
      Run /sds:simulate-capability after traceability.md is complete.
    requires:
      - traceability

  - id: tasks
    generates: tasks.md
    description: Ordered implementation checklist
    template: tasks.md
    instruction: |
      Create the task list. Each task: `- [ ] X.Y Task description`.
      Include governance steps: run /sds:compute-surface, /sds:traceability-check,
      /sds:simulate-capability, /sds:check-drift as explicit tasks.
    requires:
      - simulation

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read all context files. Work through pending tasks, mark complete as you go.
    Governed-tier apply requires /sds:check-drift to pass before deployment steps.
    Pause on any CRITICAL finding in simulation.md.
